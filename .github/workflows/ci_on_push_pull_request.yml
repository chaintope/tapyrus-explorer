name: CI on Push and PullRequest

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    env:
      TZ: "Asia/Tokyo"
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup libraries for Frontend
        run: |
          sudo apt update
          sudo apt install -y ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release wget xdg-utils
      - name: Setup Backend
        run: |
          cd backend
          npm install
          npm run prettier-ci
          npm run test
      - name: Diagnose Puppeteer Chrome
        working-directory: frontend
        run: |
          echo "== versions =="
          node -v; npm -v
          echo "== expected executablePath =="
          PUPPETEER_SKIP_DOWNLOAD=true npm install --silent
          node -e "console.log('expected:', require('puppeteer').executablePath())"
          echo "== connectivity to storage.googleapis.com =="
          curl -sI -o /dev/null -w "zip HTTP %{http_code} size=%header{content-length}\n" \
            "https://storage.googleapis.com/chrome-for-testing-public/146.0.7680.76/linux64/chrome-linux64.zip" || echo "curl FAILED"
          echo "== cache before =="
          ls -alR ~/.cache/puppeteer || echo "(no cache dir)"
          echo "== explicit install (debug) =="
          DEBUG=puppeteer:*,browsers:* npx puppeteer browsers install chrome \
            --format "{{browser}} {{buildId}} {{path}}"; echo "install exit=$?"
          echo "== cache after =="
          ls -alR ~/.cache/puppeteer || true
      - name: Setup Frontend
        run: |
          cd frontend
          npm install --foreground-scripts --loglevel verbose
          npm run lint
          npm run prettier-ci
          npm run test -- --no-watch --no-progress --browsers=ChromeHeadlessCI
          npm run build -- --configuration=production
